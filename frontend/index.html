<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>ÖZTÜRK OTOMOBİL OTO ELEKTRİK | Stok Takip</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="loginDiv">
    <h2>Giriş Yap</h2>
    <form id="loginForm">
      <input type="text" name="username" placeholder="Kullanıcı adı" required>
      <input type="password" name="password" placeholder="Şifre" required>
      <button type="submit">Giriş</button>
    </form>
    <div id="loginError" class="error"></div>
  </div>

  <div id="dashboard" style="display:none">
    <button onclick="logout()">Çıkış Yap</button>
    <h1>ÖZTÜRK OTOMOBİL OTO ELEKTRİK</h1>
    <div id="currentUser"></div>
    <!-- Ürün ekleme formu buraya gelecek -->
    <form id="productForm">
      <!-- product.js içeriğindeki form alanları -->
    </form>
    <input id="searchInput" placeholder="Ara..." />
    <ul id="productsUl"></ul>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="product.js"></script>
  <script>
    // login işlemi
    const loginForm = document.getElementById("loginForm");
    const loginError = document.getElementById("loginError");
    const loginDiv = document.getElementById("loginDiv");
    const dashboard = document.getElementById("dashboard");

    loginForm.onsubmit = async e => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(loginForm));
      const res = await fetch("https://ozturkoto52.onrender.com/api/auth/login", {
        method: "POST",
        headers: { "Content-Type":"application/json" },
        body: JSON.stringify(data)
      });
      const body = await res.json();
      if (!res.ok) return loginError.innerText = body.message || "Giriş başarısız";
      localStorage.setItem("token", body.token);
      localStorage.setItem("username", body.username);
      loginDiv.style.display = "none";
      dashboard.style.display = "block";
      document.getElementById("currentUser").innerText = body.username;
      fetchProducts();
      setupSocket();
    };

    function logout(){
      localStorage.clear();
      loginDiv.style.display = "block";
      dashboard.style.display = "none";
    }

    function setupSocket(){
      const socket = io("https://ozturkoto52.onrender.com");
      socket.on("update", fetchProducts);
    }
  </script>
</body>
</html>
