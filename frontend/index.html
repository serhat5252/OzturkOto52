<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ÖZTÜRK OTOMOBİL OTO ELEKTRİK</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- AUTH: Giriş / Kayıt -->
  <div class="auth-container" id="authBox">
    <h1>ÖZTÜRK OTOMOBİL</h1>
    <form id="loginForm">
      <input name="username" placeholder="Kullanıcı Adı" required>
      <input type="password" name="password" placeholder="Şifre" required>
      <button type="submit">Giriş Yap</button>
    </form>
    <p class="switch"><a href="#" id="showRegister">Kayıt Ol</a></p>
    <div id="loginMessage" class="error"></div>

    <form id="registerForm" style="display:none">
      <input name="username" placeholder="Yeni Kullanıcı" required>
      <input type="password" name="password" placeholder="Şifre Belirle" required>
      <button type="submit">Kayıt Ol</button>
    </form>
    <p class="switch" id="backToLogin" style="display:none"><a href="#" id="showLogin">Giriş Yap</a></p>
    <div id="registerMessage" class="success"></div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard" id="dashboard" style="display:none">
    <header class="navbar">
      <div class="brand">🚗 ÖZTÜRK OTOMOBİL OTO ELEKTRİK</div>
      <div class="user"><span id="currentUser"></span> <button onclick="logout()">Çıkış Yap</button></div>
    </header>

    <div class="main">
      <aside class="sidebar">
        <div class="tabs">
          <div class="tab active" data-tab="formTab">Ürün Ekle/Güncelle</div>
          <div class="tab" data-tab="searchTab">Detaylı Arama</div>
          <div class="tab" data-tab="reportTab">Satış Raporu</div>
        </div>
      </aside>
      <section class="content">
        <!-- Ürün Formu -->
        <div id="formTab" class="tabContent" style="display:block">
          <form id="productForm" class="form-grid">
            <!-- form alanları (name, category...) -->
            <!-- ... -->
            <div class="form-buttons">
              <button type="submit">Kaydet</button>
              <button type="button" id="clearFormBtn">Temizle</button>
            </div>
          </form>
        </div>
        <!-- Arama Sekmesi -->
        <div id="searchTab" class="tabContent" style="display:none">
          <input id="filterKeyword" placeholder="Ara: isim, kod, açıklama">
          <button onclick="applySearch()">Ara</button>
          <button onclick="clearSearch()">Temizle</button>
          <div id="filterMatches"></div>
        </div>
        <!-- Rapor Sekmesi -->
        <div id="reportTab" class="tabContent" style="display:none">
          <input type="date" id="fromDate"> – <input type="date" id="toDate">
          <button onclick="getSalesReport()">Rapor Al</button>
          <div id="reportResult"></div>
        </div>

        <!-- Ürün Listesi -->
        <div class="list-container">
          <ul id="productsUl" style="display:none"></ul>
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="product.js"></script>
</body>
</html>
