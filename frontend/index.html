<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ÖZTÜRK OTOMOBİL OTO ELEKTRİK</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth">

  <!-- 👤 Giriş / Kayıt -->
  <div class="auth-container" id="authBox">
    <h1>ÖZTÜRK OTOMOBİL</h1>

    <form id="loginForm">
      <input type="text" name="username" placeholder="Kullanıcı Adı" required />
      <input type="password" name="password" placeholder="Şifre" required />
      <button type="submit">Giriş Yap</button>
    </form>
    <p>Hesabın yok mu? <a href="#" id="showRegister">Kayıt Ol</a></p>
    <div id="loginMessage" class="error"></div>

    <form id="registerForm" style="display:none">
      <input type="text" name="username" placeholder="Yeni Kullanıcı Adı" required />
      <input type="password" name="password" placeholder="Şifre Belirle" required />
      <button type="submit">Kayıt Ol</button>
    </form>
    <p id="backToLogin" style="display:none">
      Zaten hesabın var mı? <a href="#" id="showLogin">Giriş Yap</a>
    </p>
    <div id="registerMessage"></div>
  </div>

  <!-- 🏠 DASHBOARD -->
  <div class="dashboard" id="dashboard" style="display:none">
    <header class="navbar">
      <div class="brand">🚗 ÖZTÜRK OTOMOBİL OTO ELEKTRİK</div>
      <div class="user">
        <span id="currentUser"></span>
        <button onclick="logout()">Çıkış Yap</button>
      </div>
    </header>
    <div class="main">
      <div class="sidebar">
        <div class="tabs">
          <div class="tab active" data-tab="formTab">Ürün Ekle/Güncelle</div>
          <div class="tab" data-tab="searchTab">Detaylı Arama</div>
          <div class="tab" data-tab="reportTab">Satış Raporu</div>
        </div>
        <div class="tab-content">
          <div id="formTab">…Ürün formunu buraya yapıştır…</div>
          <div id="searchTab" style="display:none">…Detaylı arama formu buraya…</div>
          <div id="reportTab" style="display:none">…Satış rapor formu buraya…</div>
        </div>
      </div>
      <div class="content">
        <ul id="productsUl"></ul>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="product.js"></script>
  <script>
    // Tab geçişleri
    document.querySelectorAll('.tab').forEach(el => {
      el.onclick = () => {
        document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('formTab').style.display = el.dataset.tab === 'formTab' ? 'block' : 'none';
        document.getElementById('searchTab').style.display = el.dataset.tab === 'searchTab' ? 'block' : 'none';
        document.getElementById('reportTab').style.display = el.dataset.tab === 'reportTab' ? 'block' : 'none';
      };
    });

    // Giriş/Kayıt geçişi
    const loginForm = document.getElementById("loginForm"),
          registerForm = document.getElementById("registerForm"),
          showRegister = document.getElementById("showRegister"),
          showLogin = document.getElementById("showLogin"),
          loginMessage = document.getElementById("loginMessage"),
          registerMessage = document.getElementById("registerMessage");

    showRegister.onclick = e => {
      e.preventDefault();
      loginForm.style.display = "none";
      showRegister.parentElement.style.display = "none";
      registerForm.style.display = "block";
      document.getElementById("backToLogin").style.display = "block";
      loginMessage.innerText = "";
    };

    showLogin.onclick = e => {
      e.preventDefault();
      loginForm.style.display = "block";
      showRegister.parentElement.style.display = "block";
      registerForm.style.display = "none";
      document.getElementById("backToLogin").style.display = "none";
      registerMessage.innerText = "";
    };

    // Register işlemi
    registerForm.onsubmit = async e => {
      e.preventDefault();
      registerMessage.innerText = "";
      const data = Object.fromEntries(new FormData(registerForm));
      try {
        const res = await fetch("/api/auth/register", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify(data)
        });
        const body = await res.json();
        if (!res.ok) throw body.message;
        registerMessage.style.color = "green";
        registerMessage.innerText = "Kayıt başarılı! Giriş yapabilirsiniz.";
      } catch(err) {
        registerMessage.style.color = "red";
        registerMessage.innerText = err;
      }
    };

    // Login işlemi
    loginForm.onsubmit = async e => {
      e.preventDefault();
      loginMessage.innerText = "";
      const data = Object.fromEntries(new FormData(loginForm));
      try {
        const res = await fetch("/api/auth/login", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify(data)
        });
        const body = await res.json();
        if (!res.ok) throw body.message;
        localStorage.setItem("token", body.token);
        localStorage.setItem("username", body.username);
        document.body.className = "dashboard";
        document.getElementById("authBox").style.display = "none";
        document.getElementById("dashboard").style.display = "flex";
        document.getElementById("currentUser").innerText = body.username;
        fetchProducts();
        const socket = io();
        socket.on("update", fetchProducts);
      } catch(err) {
        loginMessage.innerText = err;
      }
    };

    function logout(){
      localStorage.clear();
      location.reload();
    }
  </script>
</body>
</html>
